<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anshu Calendar App - Smart Event Planner</title>

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#5b6cff">

    <meta name="description" content="Anshu Calendar App is a smart event planner to manage personal, work and study events easily.">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7FK4VGXCK1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-7FK4VGXCK1');
</script>
</head>

<body>
    <div id="loadingScreen">

    <div class="loader"></div>

    <h2>Loading Calendar...</h2>

</div>

<div class="container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">
            <span class="logo-icon">📅</span>
            <span>Calendar App</span>
        </div>

        <button class="create-btn" id="createBtn">
    + Create Event
</button>

<button id="loginBtn">
    🔑 Login With Google
</button>

<button id="logoutBtn">
    🚪 Logout
</button>

      <div class="menu-item active" id="monthViewBtn">
    📅 Month
</div>

<div class="menu-item" id="weekViewBtn">
    📋 Week
</div>

<div class="menu-item" id="dayViewBtn">
    🗓️ Day
</div>

<div class="menu-item" id="sidebarTodayBtn">
    🕒 Today
</div>

        <!-- MINI CALENDAR -->

        <div class="mini-calendar">

            <h3>Mini Calendar</h3>

           <div class="mini-box" id="miniCalendar"></div>

        </div>

        <!-- MY CALENDARS -->
         <select id="filterCategory">

    <option value="All">
        All Events
    </option>

    <option value="Personal">
        Personal
    </option>

    <option value="Work">
        Work
    </option>

    <option value="Study">
        Study
    </option>

</select>

        <div class="my-calendars">

            <h3>My Calendars</h3>

            <div class="calendar-tag purple">
                Personal
            </div>

            <div class="calendar-tag blue">
                Work
            </div>

            <div class="calendar-tag green">
                Study
            </div>

        </div>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <!-- TOP BAR -->

        <div class="topbar">

            <div class="left-top">

                <button class="nav-btn" id="prevBtn">❮</button>

<button class="nav-btn" id="nextBtn">❯</button>

                <button class="today-btn" id="todayBtn">
    Today
</button>
<input
    type="file"
    id="importFile"
    accept=".json"
>
  <button id="exportBtn">
    Export Events
</button>

            </div>

            <div class="center-top">

                <h1 id="monthYear">
                    June 2026
                </h1>

            </div>

            <div class="right-top">

                <input
    type="text"
    id="searchInput"
    placeholder="Search events..."
>

                <div class="avatar">
                    A
                </div>

            </div>

        </div>

        <!-- CALENDAR -->

        <div class="calendar-box">

            <div class="weekdays">

                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>

            </div>

            <div id="days"></div>
            <div id="weekView" style="display:none;"></div>
            <div id="dayView"></div>
            <div id="agendaView"></div>

        </div>

        <!-- EVENTS PANEL -->

        <div class="events-panel">

            <div class="events-header">

                <h2>
                    Today's Events
                </h2>

            </div>
            <div id="eventsList">
                <p>Select a date</p>
            </div>
        </div>

    </main>

</div>

<!-- Tooltip -->

<div id="tooltip" class="event-tooltip"></div>

<!-- Event Modal -->

<div class="modal" id="eventModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Create Event</h2>

            <button id="closeModal">✕</button>

        </div>

        <input
    type="text"
    id="eventInput"
    placeholder="Event Title"
>
<input
    type="time"
    id="eventTime"
>

        <textarea
            id="eventDesc"
            placeholder="Event Description"
        ></textarea>

        <select id="eventColor">

            <option value="#5b6cff">Blue</option>

            <option value="#7a42ff">Purple</option>

            <option value="#00b894">Green</option>

            <option value="#ff7675">Red</option>

        </select>
        <select id="eventCategory">

    <option value="Personal">
        Personal
    </option>

    <option value="Work">
        Work
    </option>

    <option value="Study">
        Study
    </option>

</select>

        <button id="saveEventBtn">
            Save Event
        </button>

    </div>

</div>

<script type="module" src="./firebase.js"></script>
<script src="script.js"></script>
<script>
if ("serviceWorker" in navigator) {

    window.addEventListener("load", async () => {

        try {

            const reg = await navigator.serviceWorker.register("./service-worker.js");

            console.log("Service Worker Registered");

            await reg.update();

        } catch (error) {

            console.error("Service Worker Error:", error);

        }

    });

}
</script>

</body>
</html>
